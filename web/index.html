<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0F1320" />
  <!-- 기본(글로벌) 메타는 영어. 홈("/") 요청 시 functions/index.js 가 방문자 언어로 제목·설명·OG를 덮어쓴다. -->
  <title>Lowstamp — Steam game lowest prices (KRW) &amp; should you buy now?</title>
  <meta name="description" content="See a Steam game's current price and all-time low, plus a buy-or-wait verdict, at a glance. Official Steam prices only, no key shops." />
  <link rel="canonical" href="https://lowstamp.com/" />

  <!-- 파비콘·앱 아이콘·웹 매니페스트 (영수증 금색 ★ 도장 컨셉) -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <link rel="manifest" href="/manifest.webmanifest" />

  <!-- 첫 화면 fetch(Worker API)와 카드 표지(steamstatic CDN) 연결을 미리 데워 LCP 단축 -->
  <link rel="preconnect" href="https://gamgap-api.ibanisac.workers.dev" />
  <link rel="preconnect" href="https://cdn.cloudflare.steamstatic.com" crossorigin />

  <!-- Open Graph (카톡·디스코드·페북 공유 미리보기). 게임 상세에선 클라이언트/Pages 함수가 content를 덮어씀 -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Lowstamp" />
  <meta property="og:title" content="Lowstamp — Steam game lowest prices (KRW) &amp; should you buy now?" />
  <meta property="og:description" content="A Steam game's current price, all-time low, and a buy-or-wait verdict at a glance." />
  <meta property="og:locale" content="en_US" />
  <meta property="og:url" content="https://lowstamp.com/" />
  <!-- 기본 공유 이미지: 글로벌 타깃이라 영어판(상록·게임/가격 없음). 언어별 og-<lang>.jpg 도 있음(향후 언어별 URL에서 사용). -->
  <meta property="og:image" content="https://lowstamp.com/og-en.jpg" />

  <!-- Twitter / X 카드 -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Lowstamp — Steam game lowest prices (KRW) &amp; should you buy now?" />
  <meta name="twitter:description" content="A Steam game's current price, all-time low, and a buy-or-wait verdict at a glance." />
  <meta name="twitter:image" content="https://lowstamp.com/og-en.jpg" />

  <!-- 방문자 분석(Cloudflare Web Analytics)은 사이트가 Cloudflare를 거쳐가므로 대시보드의 '자동 설정(Automatic setup)'이 엣지에서 처리한다 — 페이지에 비콘 스니펫을 넣지 않는다(중복 방지). 토큰을 직접 박는 수동 스니펫을 다시 넣지 말 것. -->

  <!-- Google 동의 모드 v2: 광고 쿠키는 사용자가 하단 쿠키 배너에서 '동의'하기 전까지 기본 '거부'. -->
  <!-- 이전 방문에서 동의했으면 그 값으로 시작. 동의 시점에 src/lib/consent.js 가 gtag로 'granted' 갱신. -->
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    window.gtag = gtag;
    (function () {
      var c = null;
      try { c = localStorage.getItem('gamgap:consent'); } catch (e) {}
      var g = c === 'granted' ? 'granted' : 'denied';
      gtag('consent', 'default', {
        ad_storage: g,
        ad_user_data: g,
        ad_personalization: g,
        analytics_storage: g,
        wait_for_update: 500
      });
    })();
  </script>

  <!-- Google AdSense (게시자 ID: ca-pub-6033148215263757). 메타태그는 사이트 소유권 확인용. -->
  <meta name="google-adsense-account" content="ca-pub-6033148215263757" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6033148215263757" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <!-- 봇용 SSR 본문(Pages 함수가 #root에 주입)은 JS 미실행 크롤러용 폴백이다.
       JS가 실행되면 React가 #root를 처음부터 그리므로, 첫 페인트 '전에' 폴백을 비워
       'SSR 본문 → React 앱' 교체로 생기던 레이아웃 이동(CLS)을 없앤다.
       (비JS 크롤러는 이 스크립트가 안 돌아 SSR 본문을 그대로 본다 = 콘텐츠 손실 없음.) -->
  <script>(function(){var r=document.getElementById('root');if(r)r.textContent='';})();</script>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
