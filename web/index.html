  <!-- Twitter / X 카드 -->

  <meta name="twitter:title" content="Lowstamp — 스팀 게임 원화 최저가·지금 사도 돼?" />

  <!-- Cloudflare Web Analytics: 대시보드에서 사이트(lowstamp.com) 추가 후 발급 토큰으로 아래 REPLACE_WITH_YOUR_CF_TOKEN 교체 -->
  <script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "REPLACE_WITH_YOUR_CF_TOKEN"}'></script>

  <!-- Google 동의 모드 v2: 광고 쿠키는 사용자가 하단 쿠키 배너에서 '동의'하기 전까지 기본 '거부'. -->
  <!-- 이전 방문에서 동의했으면 그 값으로 시작. 동의 시점에 src/lib/consent.js 가 gtag로 'granted' 갱신. -->
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    window.gtag = gtag;
    (function () {
      var c = null;
      try { c = localStorage.getItem('gamgap:consent'); } catch (e) {}
      var g = c === 'granted' ? 'granted' : 'denied';
      gtag('consent', 'default', {
        ad_storage: g,
        ad_user_data: g,
        ad_personalization: g,
        analytics_storage: g,
        wait_for_update: 500
      });
    })();
  </script>
